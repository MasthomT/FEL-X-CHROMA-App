<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
			<title>Chroma Key</title>
			<style>
				*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
				:root {
				--bg: #0e0e0f; --surface: #161618; --panel: #1c1c1f;
				--border: rgba(255,255,255,0.07); --border-md: rgba(255,255,255,0.12);
				--text: #f0f0f0; --muted: #6b6b72;
				--accent: #7c6fcd; --accent-glow: rgba(124,111,205,0.18); --accent-dim: rgba(124,111,205,0.08);
				--green: #3ecf8e; --red: #e05c5c;
				--r: 10px; --rl: 14px;
				}
				html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; }

				#titlebar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; -webkit-app-region: drag; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; }
				.tb-brand { display: flex; align-items: center; gap: 10px; -webkit-app-region: no-drag; }
				.brand-logo {
				width: 18px;
				height: 18px;
				object-fit: contain;
				/* Optionnel : border-radius: 4px; si ton logo n'est pas déjà rond/détouré */
				}
				.brand-name { font-size: 13px; font-weight: 600; letter-spacing: .04em; }
				.brand-ver { font-size: 10px; color: var(--muted); margin-left: 2px; }
				.tb-wm { display: flex; gap: 6px; -webkit-app-region: no-drag; }
				.wm-btn { width: 28px; height: 28px; border-radius: 8px; border: none; background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; }
				.wm-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
				.wm-btn.close:hover { background: rgba(224,92,92,0.2); color: var(--red); }

				#app { display: flex; height: calc(100vh - 44px); }

				#sidebar { width: 260px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; gap: 8px; overflow-y: auto; }
				.slabel { font-size: 10px; font-weight: 600; letter-spacing: .1em; color: var(--muted); text-transform: uppercase; padding: 8px 4px 4px; }

				#drop-zone { border: 1.5px dashed var(--border-md); border-radius: var(--rl); padding: 20px 12px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; background: var(--accent-dim); }
				#drop-zone:hover, #drop-zone.drag-over { border-color: var(--accent); background: var(--accent-glow); }
				#drop-zone svg { display: block; margin: 0 auto 8px; opacity: .45; }
				.dz1 { font-size: 12px; font-weight: 600; margin-bottom: 3px; }
				.dz2 { font-size: 11px; color: var(--muted); }
				#file-name { font-size: 11px; color: var(--green); margin-top: 6px; word-break: break-all; display: none; }

				.cg { background: var(--panel); border-radius: var(--r); padding: 14px; border: 1px solid var(--border); }
				.cr { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
				.cr:last-child { margin-bottom: 0; }
				.cl { font-size: 11px; color: var(--muted); min-width: 70px; }
				.cv { font-size: 11px; font-weight: 600; min-width: 28px; text-align: right; }

				input[type=range] { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 99px; background: var(--border-md); outline: none; cursor: pointer; }
				input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); cursor: pointer; }

				#color-swatch { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border-md); cursor: pointer; flex-shrink: 0; }
				#color-input { display: none; }
				#color-hex { font-size: 11px; color: var(--muted); font-family: monospace; }

				.btn { width: 100%; padding: 10px; border-radius: var(--r); border: none; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: opacity .15s, transform .1s; }
				.btn:active { transform: scale(0.98); }
				.btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }
				.btn-primary { background: var(--accent); color: #fff; box-shadow: 0 2px 12px var(--accent-glow); }
				.btn-primary:hover:not(:disabled) { opacity: .88; }
				.btn-ghost { background: var(--panel); color: var(--text); border: 1px solid var(--border-md); }
				.btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.06); }

				#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
				#preview-area { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); overflow: hidden; }
				.ppane { background: var(--bg); display: flex; flex-direction: column; overflow: hidden; position: relative; }
				.plabel { position: absolute; top: 12px; left: 14px; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); z-index: 2; background: rgba(14,14,15,0.75); padding: 3px 9px; border-radius: 99px; border: 1px solid var(--border); }
				.pinner { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
				.pinner.ck {
				background-image: linear-gradient(45deg,#1a1a1a 25%,transparent 25%), linear-gradient(-45deg,#1a1a1a 25%,transparent 25%), linear-gradient(45deg,transparent 75%,#1a1a1a 75%), linear-gradient(-45deg,transparent 75%,#1a1a1a 75%);
				background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0; background-color: #131313;
				}
				video, canvas { max-width: 100%; max-height: 100%; display: block; }
				.pempty { text-align: center; }
				.pempty svg { opacity: .1; display: block; margin: 0 auto 12px; }
				.pempty p { font-size: 12px; color: var(--muted); }

				#statusbar { height: 40px; border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 16px; background: var(--surface); flex-shrink: 0; }
				.sstat { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
				.sdot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
				.sdot.ready { background: var(--green); box-shadow: 0 0 4px var(--green); }
				.sdot.working { background: var(--accent); box-shadow: 0 0 4px var(--accent); animation: pulse 1s infinite; }
				@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
				#prog-track { width: 200px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; display: none; }
				#prog-fill { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width .1s; }
				#prog-pct { font-size: 11px; color: var(--accent); font-weight: 600; display: none; }
			</style>
		</head>
	<body>

		<div id="titlebar">
			<div class="tb-brand">
				<div class="tb-brand">
					<img src="assets/icon.png" class="brand-logo" alt="Logo">
						<span class="brand-name">Chroma Key</span>
						<span class="brand-ver">v1.0</span>
					</div>
				<span class="brand-name">FEL-X CHROMA</span>
				<span class="brand-ver">v1.0</span>
			</div>
			<div class="tb-wm">
				<button class="wm-btn" id="btn-min" aria-label="Réduire">
					<svg width="10" height="2" viewBox="0 0 10 2" fill="currentColor">
						<rect width="10" height="2" rx="1"/>
					</svg>
				</button>
				<button class="wm-btn" id="btn-max" aria-label="Agrandir">
					<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5">
						<rect x="1" y="1" width="8" height="8" rx="1.5"/>
					</svg>
				</button>
				<button class="wm-btn close" id="btn-close" aria-label="Fermer">
					<svg width="10" height="10" viewBox="0 0 10 10" stroke="currentColor" stroke-width="1.5">
						<line x1="1" y1="1" x2="9" y2="9"/>
						<line x1="9" y1="1" x2="1" y2="9"/>
					</svg>
				</button>
			</div>
		</div>

		<div id="app">
			<div id="sidebar">
				<div class="slabel">Fichier source</div>
				<div id="drop-zone" tabindex="0" role="button" aria-label="Importer une vidéo">
					<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
						<path d="M15 10l4.553-2.276A1 1 0 0121 8.68v6.64a1 1 0 01-1.447.894L15 14"/>
						<rect x="3" y="6" width="12" height="12" rx="2"/>
					</svg>
					<div class="dz1">Glisser une vidéo ici</div>
					<div class="dz2">ou cliquer pour parcourir</div>
					<div id="file-name"></div>
				</div>
				<input type="file" id="file-input" accept="video/*">

					<div class="slabel">Chroma key</div>
					<div class="cg">
						<div class="cr">
							<span class="cl">Couleur</span>
							<div style="display:flex;align-items:center;gap:8px;flex:1">
								<div id="color-swatch"></div>
								<input type="color" id="color-input" value="#00b140">
									<span id="color-hex">#00b140</span>
								</div>
						</div>
						<div class="cr">
							<span class="cl">Tolérance</span>
							<input type="range" id="tol" min="0" max="220" value="80" step="1">
								<span class="cv" id="tol-val">80</span>
							</div>
						<div class="cr">
							<span class="cl">Douceur</span>
							<input type="range" id="soft" min="0" max="120" value="20" step="1">
								<span class="cv" id="soft-val">20</span>
							</div>
					</div>

					<div class="slabel">Export</div>
					<button class="btn btn-primary" id="btn-process" disabled="">
						<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
							<path d="M8 5v14l11-7z"/>
						</svg>
						Lancer le traitement
					</button>
					<button class="btn btn-ghost" id="btn-download" disabled="" style="margin-top:6px">
						<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
							<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
							<polyline points="7 10 12 15 17 10"/>
							<line x1="12" y1="15" x2="12" y2="3"/>
						</svg>
						Télécharger WebM
					</button>
				</div>

			<div id="main">
				<div id="preview-area">
					<div class="ppane">
						<div class="plabel">Source</div>
						<div class="pinner" id="src-pane">
							<div class="pempty" id="src-empty">
								<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
									<rect x="3" y="6" width="12" height="12" rx="2"/>
									<path d="M15 10l4.553-2.276A1 1 0 0121 8.68v6.64a1 1 0 01-1.447.894L15 14"/>
								</svg>
								<p>Aucune vidéo importée</p>
							</div>
							<video id="src-video" muted="" playsinline="" loop="" style="display:none"></video>
						</div>
					</div>
					<div class="ppane">
						<div class="plabel">Aperçu — sans fond</div>
						<div class="pinner ck" id="out-pane">
							<div class="pempty" id="out-empty">
								<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
									<circle cx="12" cy="12" r="10"/>
									<line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
								</svg>
								<p>Aperçu disponible après import</p>
							</div>
							<canvas id="out-canvas" style="display:none"></canvas>
						</div>
					</div>
				</div>

				<div id="statusbar">
					<div class="sstat">
						<div class="sdot" id="sdot"></div>
						<span id="stext">En attente</span>
					</div>
					<div id="prog-track">
						<div id="prog-fill"></div>
					</div>
					<span id="prog-pct"></span>
				</div>
			</div>
		</div>

		<script>
			const api = window.electronAPI

			document.getElementById('btn-min').onclick = () => api?.minimizeWindow()
			document.getElementById('btn-max').onclick = () => api?.maximizeWindow()
			document.getElementById('btn-close').onclick = () => api?.closeWindow()

			const dropZone   = document.getElementById('drop-zone')
			const fileInput  = document.getElementById('file-input')
			const srcVideo   = document.getElementById('src-video')
			const outCanvas  = document.getElementById('out-canvas')
			const outCtx     = outCanvas.getContext('2d', { willReadFrequently: true })
			const colorSwatch = document.getElementById('color-swatch')
			const colorInput = document.getElementById('color-input')
			const colorHex   = document.getElementById('color-hex')
			const tolSlider  = document.getElementById('tol')
			const softSlider = document.getElementById('soft')
			const btnProcess = document.getElementById('btn-process')
			const btnDownload = document.getElementById('btn-download')
			const sdot       = document.getElementById('sdot')
			const stext      = document.getElementById('stext')
			const progTrack  = document.getElementById('prog-track')
			const progFill   = document.getElementById('prog-fill')
			const progPct    = document.getElementById('prog-pct')
			const fileName   = document.getElementById('file-name')

			let chromaRgb = { r: 0, g: 177, b: 64 }
			let videoLoaded = false
			let animFrame = null
			let outputBlob = null

			function setStatus(state, text) {
			sdot.className = 'sdot' + (state ? ' ' + state : '')
			stext.textContent = text
			}
			function setProgress(pct) {
			progTrack.style.display = pct === null ? 'none' : 'block'
			progPct.style.display   = pct === null ? 'none' : 'inline'
			if (pct !== null) { progFill.style.width = pct + '%'; progPct.textContent = pct + '%' }
			}

			colorSwatch.style.background = colorInput.value
			colorSwatch.onclick = () => colorInput.click()
			colorInput.oninput = () => {
			const h = colorInput.value
			colorSwatch.style.background = h
			colorHex.textContent = h
			chromaRgb = { r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) }
			}

			tolSlider.oninput  = () => document.getElementById('tol-val').textContent  = tolSlider.value
			softSlider.oninput = () => document.getElementById('soft-val').textContent = softSlider.value

			dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('drag-over') }
			dropZone.ondragleave = () => dropZone.classList.remove('drag-over')
			dropZone.ondrop = e => {
			e.preventDefault(); dropZone.classList.remove('drag-over')
			const f = e.dataTransfer.files[0]
			if (f && f.type.startsWith('video/')) loadVideo(f)
			}
			dropZone.onclick = async () => {
			if (api) { const p = await api.openFileDialog(); if (p) loadVideoPath(p) }
			else fileInput.click()
			}
			dropZone.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') dropZone.click() }
			fileInput.onchange = () => { if (fileInput.files[0]) loadVideo(fileInput.files[0]) }

			function loadVideo(file) { loadVideoPath(URL.createObjectURL(file), file.name) }

			function loadVideoPath(url, name) {
			srcVideo.src = url
			srcVideo.style.display = 'block'
			document.getElementById('src-empty').style.display = 'none'
			srcVideo.onloadedmetadata = () => {
			const scale = Math.min(1, 1280 / srcVideo.videoWidth)
			outCanvas.width  = Math.round(srcVideo.videoWidth  * scale)
			outCanvas.height = Math.round(srcVideo.videoHeight * scale)
			outCanvas.style.display = 'block'
			document.getElementById('out-empty').style.display = 'none'
			videoLoaded = true
			outputBlob = null
			btnProcess.disabled = false
			btnDownload.disabled = true
			fileName.textContent = name || url.split('/').pop()
			fileName.style.display = 'block'
			setStatus('ready', 'Vidéo prête — ' + srcVideo.videoWidth + '×' + srcVideo.videoHeight)
			setProgress(null)
			srcVideo.play()
			startPreview()
			}
			}

			function applyChroma(imgData, tol, soft) {
			const d = imgData.data
			const { r: cr, g: cg, b: cb } = chromaRgb
			const s = Math.max(1, soft)
			for (let i = 0; i < d.length; i += 4) {
    const dr = d[i]-cr, dg = d[i+1]-cg, db = d[i+2]-cb
    const dist = Math.sqrt(dr*dr + dg*dg + db*db)
    if (dist < tol)        d[i+3] = 0
    else if (dist < tol+s) d[i+3] = Math.round(((dist-tol)/s)*255)
  }
  return imgData
}

const _tmp = document.createElement('canvas')
const _tc  = _tmp.getContext('2d', { willReadFrequently: true })

function startPreview() {
  if (animFrame) cancelAnimationFrame(animFrame)
  const draw = () => {
    if (videoLoaded && !srcVideo.paused && !srcVideo.ended) {
		if (_tmp.width !== outCanvas.width) { _tmp.width = outCanvas.width; _tmp.height = outCanvas.height }
		_tc.drawImage(srcVideo, 0, 0, outCanvas.width, outCanvas.height)
		const img = _tc.getImageData(0, 0, outCanvas.width, outCanvas.height)
		applyChroma(img, parseInt(tolSlider.value), parseInt(softSlider.value))
		outCtx.clearRect(0, 0, outCanvas.width, outCanvas.height)
		outCtx.putImageData(img, 0, 0)
		}
		animFrame = requestAnimationFrame(draw)
		}
		animFrame = requestAnimationFrame(draw)
		}

		btnProcess.onclick = async () => {
		if (!videoLoaded) return
		if (animFrame) cancelAnimationFrame(animFrame)

		btnProcess.disabled = true
		btnDownload.disabled = true
		setStatus('working', 'Initialisation...')
		setProgress(0)

		const dur = srcVideo.duration

		const stream = outCanvas.captureStream(30)

		let options = { mimeType: 'video/webm; codecs=vp9' }
		if (!MediaRecorder.isTypeSupported(options.mimeType)) {
		options = { mimeType: 'video/webm; codecs=vp8' }
		}

		const recorder = new MediaRecorder(stream, options)
		const chunks = []

		recorder.ondataavailable = e => {
		if (e.data.size > 0) chunks.push(e.data)
		}

		recorder.onstop = () => {
		outputBlob = new Blob(chunks, { type: 'video/webm' })
		const mb = (outputBlob.size / 1024 / 1024).toFixed(1)

		setStatus('ready', `Terminé — ${mb} Mo`)
		setProgress(100)
		btnDownload.disabled = false
		btnProcess.disabled = false

		srcVideo.play()
		startPreview()
		}

		setStatus('working', 'Enregistrement en temps réel...')

		srcVideo.onseeked = () => {
		srcVideo.onseeked = null

		recorder.start()
		srcVideo.play()
		startPreview()
	
		const trackProgress = () => {
		if (!srcVideo.ended && srcVideo.currentTime < dur - 0.05) {
        const pct = Math.min(98, Math.round((srcVideo.currentTime / dur) * 100))
        setProgress(pct)
        stext.textContent = `Enregistrement — ${pct}%`
        requestAnimationFrame(trackProgress)
      } else {
	  
        srcVideo.pause()
        recorder.stop()
      }
    }
    trackProgress()
  }

  srcVideo.pause()
  if (srcVideo.currentTime === 0) {
    srcVideo.onseeked()
  } else {
    srcVideo.currentTime = 0
  }
}

		</script>
	</body>
</html>
